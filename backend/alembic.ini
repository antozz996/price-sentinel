# Price Sentinel — Alembic Configuration
# Utilizzato per migrazioni database PostgreSQL

[alembic]
# Path al directory delle migrazioni
script_location = alembic

# Template per i file di migrazione
file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# Timezone per i timestamp nei file di migrazione
timezone = UTC

# La stringa di connessione viene letta da env.py tramite Settings
# sqlalchemy.url viene sovrascritta programmaticamente in env.py

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
